<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background: #0078d7;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #005fa3;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Willkommen auf meiner Website</h1>
        <p>Eine einfache HTML-Beispielseite</p>
    </header>

    <nav>
        <a href="#">Startseite</a>
        <a href="#">Über uns</a>
        <a href="#">Leistungen</a>
        <a href="#">Kontakt</a>
    </nav>

    <main>
        <h2>Hallo!</h2>
        <p>
            Dies ist eine einfache HTML-Website mit eingebettetem CSS.
            Sie eignet sich als Ausgangspunkt für eigene Projekte.
        </p>

        <button onclick="alert('Danke für deinen Besuch!')">
            Klick mich
        </button>
    </main>

    <footer>
        &copy; 2026 Meine Website. Alle Rechte vorbehalten.
    </footer>

</body>
</html>
